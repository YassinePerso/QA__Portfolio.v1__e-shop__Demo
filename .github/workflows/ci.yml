
name: Demo Web Shop Automation Pipeline   #Name displayed on Github graphic interface


#Defining actions on which tests are triggered
on:
  push:           #Triggering the tests on PUSH
    branches:
      - main
      - dev
  pull_request:   #Triggering the tests on PULL REQUEST
    branches:
      - main
      - dev



#First step : Code review with a linter -> flake8
#This step is the first security step to not get false negative tests
jobs:


  lint:   #First for code review (lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4    #Github action that clones the repo on virtual machine

      - name: Set up Python
        uses: actions/setup-python@v5     #Github action that installs python
        with:
          python-version: '3.12'          #indicates version of python needed
      
      - name: Install flake8          #We use flake8 as a linter
        run: pip install flake8       #installing flake8
      
      - name: Run lint                
        run: flake8 pages/ tests/ step_definitions/ conftest.py --max-line-length=200  #"--max-line-length=200" is used to indicate to flake8 that code lines over 200 characters must be signaled as errors



  smoke-tests:   #For smoke tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4    #Github action that clones the repo on virtual machine

      - name: Set up Python
        uses: actions/setup-python@v5     #Github action that installs python
        with:
          python-version: '3.12.3'          #indicates version of python needed
      
      - name: Install dependencies          
        run: pip install -r requirements.txt      #installing dependencies
      
      - name: Run smoke-tests
        continue-on-error: true   #Added because DemoWebShop is blocking login tests cases due to IP problems 
        env:
          REGISTERED_EMAIL: ${{ secrets.REGISTERED_EMAIL }}
          REGISTERED_PASSWORD: ${{ secrets.REGISTERED_PASSWORD }}            
        run:  pytest tests/End-to-end/ -v -m smoke --html=reports/smoke_report.html --self-contained-html

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: reports/smoke_report.html



  regression-tests:   #For regression tests
    needs: smoke-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4    #Github action that clones the repo on virtual machine

      - name: Set up Python
        uses: actions/setup-python@v5     #Github action that installs python
        with:
          python-version: '3.12'          #indicates version of python needed
      
      - name: Install dependencies          
        run: pip install -r requirements.txt      #installing dependencies
      
      - name: Run regression-tests
        continue-on-error: true       #Added because DemoWebShop is blocking login tests cases due to IP problems 
        env:
          REGISTERED_EMAIL: ${{ secrets.REGISTERED_EMAIL }}
          REGISTERED_PASSWORD: ${{ secrets.REGISTERED_PASSWORD }}            
        run:  pytest tests/End-to-end/ -v --html=reports/regression_report.html --self-contained-html    #Without "-m" to run all test for complete test report 

      - name: Upload regression test report
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-report
          path: reports/regression_report.html


  bdd-tests:   #For BDD/Gherkin tests via pytest-bdd
    needs: smoke-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bdd-tests
        continue-on-error: true   # Added because DemoWebShop is blocking login test cases due to IP problems
        env:
          REGISTERED_EMAIL: ${{ secrets.REGISTERED_EMAIL }}
          REGISTERED_PASSWORD: ${{ secrets.REGISTERED_PASSWORD }}
        run: pytest step_definitions/ -v --html=reports/bdd_report.html --self-contained-html

      - name: Upload bdd test report
        uses: actions/upload-artifact@v4
        with:
          name: bdd-test-report
          path: reports/bdd_report.html



  api-tests:   #For API Postman tests
    needs: smoke-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4    #Github action that clones the repo on virtual machine

      - name: Set up Node.js
        uses: actions/setup-node@v4    #Github action that installs Node.js
        with:
          node-version: '24'          #indicates version of node.js needed
      
      - name: Install Newman         
        run:  npm install -g newman      #Install Newman

      - name: Install Newman HTML reporter
        run: npm install -g newman-reporter-html    #Install newman-reporter-html to generate report in Virtual Machine

      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run api-tests                
        run:  newman run postman/demowebshop_collection.json -e postman/environment.json --reporters cli,html --reporter-html-export reports/api_report.html

      - name: Upload api test report
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/api_report.html



